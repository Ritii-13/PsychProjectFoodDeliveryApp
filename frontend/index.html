<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery Study | Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="home">
    <main class="container">
      <section class="card home-page">
        <div class="home-hero">
          <div class="home-icon">🍽️</div>
          <h1 class="home-title">Delivery Experience Study</h1>
          <p class="home-subtitle">Start your participant session</p>
        </div>

        <form id="session-form" class="home-form">
          <div class="home-input-group">
            <label for="participant-id" class="home-label">
              Participant ID
            </label>
            <div class="home-input-with-buttons">
              <button type="button" class="home-decrement-btn" id="participant-decrement" title="Decrease">−</button>
              <input 
                id="participant-id" 
                class="home-input"
                required 
                placeholder="e.g., P-001" 
                value="P-001"
              />
              <button type="button" class="home-increment-btn" id="participant-increment" title="Increase">+</button>
            </div>
          </div>

          <div class="home-input-group">
            <label for="experiment-id" class="home-label">
              Experiment ID
            </label>
            <div class="home-input-with-buttons">
              <button type="button" class="home-decrement-btn" id="experiment-decrement" title="Decrease">−</button>
              <input 
                id="experiment-id" 
                class="home-input"
                required 
                placeholder="e.g., 001" 
                value="001"
              />
              <button type="button" class="home-increment-btn" id="experiment-increment" title="Increase">+</button>
            </div>
          </div>

          <button type="submit" class="home-button">
            <span>Continue</span>
            <span class="home-button-arrow">→</span>
          </button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
