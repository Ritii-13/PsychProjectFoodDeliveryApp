<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery Study | Rating</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="rating">
    <main class="container">
      <section class="card rating-page">
        <div class="rating-header">
          <div class="rating-icon">⭐</div>
          <h1 class="rating-title">Post-Delivery Survey</h1>
          <p id="rating-meta" class="rating-subtitle"></p>
        </div>

        <form id="rating-form" class="rating-form">
          <div class="rating-input-group">
            <label for="rating-overall" class="rating-label">
              Overall experience (1-5)
            </label>
            <input 
              type="number" 
              id="rating-overall" 
              class="rating-input"
              min="1" 
              max="5" 
              required 
              placeholder="Rate from 1 to 5"
            />
          </div>

          <div class="rating-input-group">
            <label for="rating-comments" class="rating-label">
              Comments
            </label>
            <textarea 
              id="rating-comments" 
              class="rating-textarea"
              rows="4" 
              placeholder="Share your feedback (optional)"
            ></textarea>
          </div>

          <button type="submit" class="rating-button">
            <span>Submit Rating</span>
          </button>
        </form>

        <p id="rating-result" class="rating-result"></p>

        <button id="back-home-icon" class="rating-home-button hidden" type="button">
          <span class="rating-home-icon">🏠</span>
          <span>Back to Home</span>
        </button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
