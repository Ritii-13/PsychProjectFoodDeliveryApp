<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery Study | Tracking</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="delivery">
    <main class="container">
      <section class="card delivery-page">
        <!-- Header with back button -->
        <div class="delivery-header">
          <div class="delivery-header-info">
            <h1 id="restaurant-name-delivery">Restaurant Name</h1>
            <p id="tracking-meta"></p>
          </div>
        </div>

        <!-- Decorative background illustration -->
        <div class="delivery-illustration">
          <!-- Fine dining background image -->
        </div>

        <!-- Status Card -->
        <div class="delivery-status-card">
          <div class="status-badge" id="status-badge">
            <span class="status-icon">✓</span>
            <span class="status-text" id="status-text">ON TIME</span>
          </div>
          
          <h2 class="status-title">Picking your order now</h2>
          <p class="status-message" id="latest-message">Delivery partner is at the restaurant, and is about to pick your order</p>
          
          <div class="delivery-time-badge" id="current-eta">16</div>
        </div>

        <!-- Order Placed Time and System Clock -->
        <div class="order-placed-section">
          <p class="order-placed-label">Order placed at <span id="order-placed-time">8:00</span></p>
          <div class="system-clock-container">
            <span id="system-clock" class="system-clock">08:00</span>
          </div>
        </div>

        <!-- Timeline (hidden by default, can be shown) -->
        <div class="timeline-section hidden">
          <h3>Order Timeline</h3>
          <ul id="timeline" class="timeline"></ul>
        </div>

        <button id="to-rating" class="hidden proceed-rating-btn" disabled>
          <span class="proceed-rating-text">Proceed to Rating</span>
        </button>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
