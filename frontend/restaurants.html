<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery Study | Select a Restaurant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="restaurants">
    <main class="container">
      <section class="card">
        <div class="page-header">
          <h1>Select a Restaurant</h1>
          <p>Choose from our partner restaurants</p>
        </div>

        <div id="restaurant-list" class="restaurant-list">
          <!-- Restaurant cards will be dynamically inserted here -->
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="bottom-nav-item">
        <span class="bottom-nav-icon">←</span>
        <span class="bottom-nav-label">Home</span>
      </button>
      <button class="bottom-nav-item bottom-nav-item-active">
        <span class="bottom-nav-icon">🍜</span>
        <span class="bottom-nav-label">Food</span>
      </button>
      <button class="bottom-nav-item">
        <span class="bottom-nav-icon">⚡</span>
        <span class="bottom-nav-label-small">15 MIN</span>
        <span class="bottom-nav-label">Bolt</span>
      </button>
      <button class="bottom-nav-item">
        <span class="bottom-nav-icon">99</span>
        <span class="bottom-nav-label">99 store</span>
      </button>
      <button class="bottom-nav-item">
        <span class="bottom-nav-icon">🛒</span>
        <span class="bottom-nav-label">Reorder</span>
      </button>
      <button class="bottom-nav-item">
        <span class="bottom-nav-icon-live">LIVE</span>
        <span class="bottom-nav-icon">🎮</span>
        <span class="bottom-nav-label">Deal Rush</span>
      </button>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
